# Databricks Asset Bundle — https://docs.databricks.com/en/dev-tools/bundles/index.html
bundle:
  name: health-cat-dashboard

# Sync only notebook content; keep bundle metadata under .bundle.
sync:
  paths:
    - notebooks/diabetic-patient-exploration.ipynb
    - src/diabetes_re_admission_stats_usa_10_years.lvdash.json

resources:
  dashboards:
    diabetes_re_admission_stats_usa_10_years:
      display_name: "Diabetes Re-admission Stats (USA, 10 years)"
      warehouse_id: 13a75c3edc23f286
      file_path: src/diabetes_re_admission_stats_usa_10_years.lvdash.json
  jobs:
    diabetic_serverless_job:
      name: diabetic-patient-exploration-run
      tasks:
        - task_key: main_task
          notebook_task:
            # Run the same notebook path that bundle deploy syncs under workspace.file_path.
            notebook_path: ${workspace.file_path}/notebooks/diabetic-patient-exploration
            source: WORKSPACE

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-e150c196-2b0e.cloud.databricks.com
      root_path: /Users/kunal.rox@gmail.com/.bundle/health-cat-dashboard/dev
      artifact_path: /Users/kunal.rox@gmail.com/.bundle/health-cat-dashboard/dev/artifacts
      state_path: /Users/kunal.rox@gmail.com/.bundle/health-cat-dashboard/dev/state
